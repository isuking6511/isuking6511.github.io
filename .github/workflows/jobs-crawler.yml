# 채용공고 크롤러 — 매일 KST 06:00 사람인 API 조회 후 jobs.json 커밋
# 저장 위치: 저장소의 .github/workflows/jobs-crawler.yml
# 사전 준비: 저장소 Settings > Secrets and variables > Actions 에
#           SARAMIN_API_KEY 시크릿 추가 (https://oapi.saramin.co.kr 무료 발급)
name: fetch-jobs

on:
  schedule:
    - cron: '0 21 * * *'   # UTC 21:00 = KST 06:00
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 공고 수집
        env:
          SARAMIN_API_KEY: ${{ secrets.SARAMIN_API_KEY }}
        run: python fetch_jobs.py

      - name: 변경 시 커밋
        run: |
          git config user.name "jobs-bot"
          git config user.email "actions@github.com"
          if ! git diff --quiet jobs.json; then
            git add jobs.json
            git commit -m "chore: jobs.json 갱신 ($(date +%F))"
            git push
          else
            echo "변경 없음"
          fi
