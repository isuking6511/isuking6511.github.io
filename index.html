<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-title" content="취준">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>취준 트래커</title>
<style>
:root{
  --bg:#0f1117;--card:#1a1d27;--card2:#232734;--text:#e8eaf0;--sub:#8b91a5;
  --accent:#5b8def;--green:#3ecf8e;--amber:#f5b942;--red:#ef6b6b;--line:#2b3040;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif;padding-bottom:90px}
header{padding:calc(env(safe-area-inset-top) + 16px) 16px 8px}
h1{font-size:20px;font-weight:700}
.sub{color:var(--sub);font-size:13px;margin-top:2px}
.dday-row{display:flex;gap:8px;overflow-x:auto;padding:12px 16px;-webkit-overflow-scrolling:touch}
.dday{flex:0 0 auto;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 12px;text-align:center}
.dday b{display:block;font-size:15px}
.dday span{font-size:11px;color:var(--sub)}
.dday.urgent b{color:var(--red)}
.dday.soon b{color:var(--amber)}
section{padding:8px 16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
.card h2{font-size:15px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.card h2 .pct{font-size:13px;color:var(--accent);font-weight:600}
.bar{height:8px;background:var(--card2);border-radius:4px;overflow:hidden;margin:6px 0 10px}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:4px;transition:width .3s}
.item{display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid var(--line);cursor:pointer}
.item:last-child{border-bottom:none}
.chk{width:22px;height:22px;border-radius:7px;border:2px solid var(--sub);flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff}
.item.done .chk{background:var(--green);border-color:var(--green)}
.item .t{flex:1;font-size:14px}
.item.done .t{color:var(--sub);text-decoration:line-through}
.item .tm{font-size:11px;color:var(--sub)}
.item.fixed .chk{border-style:dashed;opacity:.5}
.sec-row{padding:10px 4px;border-bottom:1px solid var(--line)}
.sec-row:last-child{border-bottom:none}
.sec-top{display:flex;justify-content:space-between;align-items:center;font-size:14px;margin-bottom:6px}
.sec-top .w{font-size:10px;background:var(--card2);color:var(--sub);border-radius:5px;padding:2px 6px;margin-right:6px}
.sec-top .p{font-size:12px;color:var(--sub)}
.steps{display:flex;gap:6px}
.steps b{flex:1;height:26px;border-radius:6px;background:var(--card2);border:1px solid var(--line);font-size:10px;color:var(--sub);display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:500}
.steps b.on{background:var(--accent);border-color:var(--accent);color:#fff}
.goal{display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid var(--line)}
.goal:last-child{border-bottom:none}
.goal .wk{font-size:11px;color:var(--sub);flex:0 0 84px}
.goal .g{flex:1;font-size:13px}
.goal button{border:1px solid var(--line);background:var(--card2);color:var(--sub);border-radius:8px;padding:6px 10px;font-size:12px}
.goal button.ok{background:var(--green);border-color:var(--green);color:#fff}
.goal button.no{background:var(--red);border-color:var(--red);color:#fff}
.tabs{position:fixed;bottom:0;left:0;right:0;display:flex;background:rgba(20,23,32,.95);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
.tabs button{flex:1;background:none;border:none;color:var(--sub);padding:12px 0 10px;font-size:11px}
.tabs button.on{color:var(--accent)}
.tabs button span{display:block;font-size:20px;margin-bottom:2px}
.page{display:none}.page.on{display:block}
input,select{background:var(--card2);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:10px;font-size:14px;width:100%}
.form-row{display:flex;gap:8px;margin-bottom:8px}
.btn{background:var(--accent);color:#fff;border:none;border-radius:9px;padding:11px;font-size:14px;font-weight:600;width:100%}
.app-row{padding:11px 4px;border-bottom:1px solid var(--line)}
.app-row:last-child{border-bottom:none}
.app-top{display:flex;justify-content:space-between;align-items:center}
.app-top b{font-size:14px}
.app-top .dd{font-size:12px;color:var(--amber);font-weight:600}
.app-top .dd.over{color:var(--sub)}
.app-bot{display:flex;justify-content:space-between;align-items:center;margin-top:5px}
.app-bot .role{font-size:12px;color:var(--sub)}
.st{font-size:11px;border-radius:6px;padding:3px 8px;border:1px solid var(--line);background:var(--card2);color:var(--sub);cursor:pointer}
.st.s1{color:var(--accent);border-color:var(--accent)}
.st.s2{color:var(--amber);border-color:var(--amber)}
.st.s3{color:var(--green);border-color:var(--green)}
.st.s4{color:var(--red);border-color:var(--red)}
.del{color:var(--sub);font-size:11px;background:none;border:none;margin-left:8px}
.empty{color:var(--sub);font-size:13px;text-align:center;padding:16px 0}
.big-pct{font-size:34px;font-weight:800;text-align:center;padding:6px 0 2px}
.big-lbl{text-align:center;color:var(--sub);font-size:12px;margin-bottom:8px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:var(--card2);border-radius:11px;padding:12px;text-align:center}
.stat b{font-size:20px;display:block}
.stat span{font-size:11px;color:var(--sub)}
</style>
</head>
<body>
<header>
  <h1 id="hTitle">취준 트래커</h1>
  <div class="sub" id="hDate"></div>
</header>
<div class="dday-row" id="ddayRow"></div>

<!-- 오늘 -->
<section class="page on" id="pg-today">
  <div class="card">
    <h2>오늘의 루틴 <span class="pct" id="todayPct"></span></h2>
    <div class="bar"><i id="todayBar"></i></div>
    <div id="todayList"></div>
  </div>
  <div class="card">
    <h2>이번 주 공부 달성률</h2>
    <div class="big-pct" id="weekPct">0%</div>
    <div class="big-lbl">최근 7일 공부 항목 기준</div>
    <div class="bar"><i id="weekBar"></i></div>
  </div>
</section>

<!-- CKA -->
<section class="page" id="pg-cka">
  <div class="card">
    <h2>CKA 전체 진행률 <span class="pct" id="ckaPct"></span></h2>
    <div class="bar"><i id="ckaBar"></i></div>
    <div class="big-lbl">뭄샤드 Udemy 기준 · 강의 분량 가중치 반영</div>
    <div id="ckaList"></div>
  </div>
</section>

<!-- 목표 -->
<section class="page" id="pg-goal">
  <div class="card">
    <h2>주차별 목표 <span class="pct" id="goalPct"></span></h2>
    <div class="bar"><i id="goalBar"></i></div>
    <div id="goalList"></div>
  </div>
</section>

<!-- 지원 -->
<section class="page" id="pg-apply">
  <div class="card">
    <h2>지원 현황</h2>
    <div class="stat-grid" style="margin-bottom:12px">
      <div class="stat"><b id="stTotal">0</b><span>총 지원</span></div>
      <div class="stat"><b id="stActive">0</b><span>진행 중</span></div>
    </div>
    <div class="form-row"><input id="inComp" placeholder="회사명"><input id="inRole" placeholder="직무 (예: 클라우드 인프라)"></div>
    <div class="form-row"><input id="inDue" type="date"></div>
    <button class="btn" onclick="addApp()">공고 등록</button>
  </div>
  <div class="card"><div id="appList"></div></div>
</section>

<div class="tabs">
  <button class="on" onclick="tab('today',this)"><span>📅</span>오늘</button>
  <button onclick="tab('cka',this)"><span>☸️</span>CKA</button>
  <button onclick="tab('goal',this)"><span>🎯</span>목표</button>
  <button onclick="tab('apply',this)"><span>📮</span>지원</button>
</div>

<script>
const LS='jobprep-v1';
let S=JSON.parse(localStorage.getItem(LS)||'{}');
S.routine=S.routine||{}; S.cka=S.cka||{}; S.goals=S.goals||{}; S.apps=S.apps||[];
const save=()=>localStorage.setItem(LS,JSON.stringify(S));

// ---- 데이터 정의 ----
const ROUTINE={
 1:[{t:'이동 중 오픽 섀도잉',tm:'11:00',s:1},{t:'일본어 학원',tm:'12–14',s:0},{t:'알바 (버리는 날, 무리 금지)',tm:'15–23',s:0}],
 2:[{t:'CKA 핸즈온 집중 6h',tm:'11–17',s:1},{t:'알바',tm:'18–22',s:0},{t:'오픽 스크립트 1개 암기',tm:'23–24',s:1}],
 3:[{t:'일본어 학원',tm:'12–14',s:0},{t:'CKA 핸즈온 4h',tm:'16–20',s:1},{t:'자소서/기업분석',tm:'21–23:30',s:1}],
 4:[{t:'CKA 핸즈온 집중 6h',tm:'11–17',s:1},{t:'알바',tm:'18–22',s:0},{t:'오픽 스크립트 1개 암기',tm:'23–24',s:1}],
 5:[{t:'일본어 학원',tm:'12–14',s:0},{t:'CKA 핸즈온 4h',tm:'16–20',s:1}],
 6:[{t:'CKA 모의시험 데이 7h',tm:'12–19',s:1}],
 0:[{t:'오픽 모의응시/롤플레이 3h',tm:'12–15',s:1},{t:'MSP/중견 지원 2~3곳',tm:'16–19',s:1},{t:'주간 리뷰 (진행률 체크)',tm:'19–19:30',s:1}]
};
// CKA 섹션: [이름, 주차, 가중치(강의 분량)]
const CKA=[
 ['Core Concepts','W1',12],['Scheduling','W2',7],['Logging & Monitoring','W2',2],
 ['Application Lifecycle Mgmt','W3',6],['Cluster Maintenance','W3',5],
 ['Security','W4',14],['Storage','W5',6],['Networking','W5',12],
 ['Design & Install Cluster','W6',3],['Install w/ kubeadm','W6',2],
 ['Helm / Kustomize','W6',4],['Troubleshooting','W6',7],
 ['Other Topics (JSONPath 등)','W7',3],['Mock Exams + Lightning Lab','W7',8],['killer.sh 2세션','W7',6]
];
const GOALS=[
 ['W1 · ~7/19','Core Concepts 완강 (Services~kubectl apply)'],
 ['W2 · 7/20~','Scheduling + Logging&Monitoring 완강'],
 ['W3 · 7/27~','App Lifecycle + Cluster Maintenance 완강'],
 ['W4 · 8/3~','Security 완강 + 오픽 1차 응시'],
 ['W5 · 8/10~','Storage + Networking 완강'],
 ['W6 · 8/17~','kubeadm + Helm + Troubleshooting 완강'],
 ['W7 · 8/24~','Mock Exam + killer.sh 2회 + CKA 응시'],
 ['9월','하반기 공채 지원 (1티어: CJ올네·삼성SDS)'],
 ['10월','정처기 실기 응시 (접수 9/21 필수!)']
];
const DDAYS=[['오픽 1차','2026-08-08'],['CKA 시험','2026-08-29'],['공채 시즌','2026-09-01'],['정처기 접수','2026-09-21'],['취준 데드라인','2027-02-01']];

// ---- 유틸 ----
const today=()=>new Date().toISOString().slice(0,10);
const fmt=d=>`${d.getMonth()+1}/${d.getDate()} (${'일월화수목금토'[d.getDay()]})`;

// ---- D-day ----
function renderDday(){
 const now=new Date(today());
 document.getElementById('ddayRow').innerHTML=DDAYS.map(([n,d])=>{
  const diff=Math.round((new Date(d)-now)/864e5);
  if(diff<0)return '';
  const cls=diff<=7?'urgent':diff<=21?'soon':'';
  return `<div class="dday ${cls}"><b>D-${diff===0?'DAY':diff}</b><span>${n}</span></div>`;
 }).join('');
}

// ---- 오늘 루틴 ----
function renderToday(){
 const d=new Date(),k=today(),items=ROUTINE[d.getDay()]||[];
 S.routine[k]=S.routine[k]||{};
 document.getElementById('hDate').textContent=fmt(d)+' · 새벽 2시 취침 지키기';
 document.getElementById('todayList').innerHTML=items.map((it,i)=>{
  const done=S.routine[k][i];
  return `<div class="item ${done?'done':''} ${it.s?'':'fixed'}" onclick="togR(${i})">
    <div class="chk">${done?'✓':''}</div><div class="t">${it.t}${it.s?'':' <span style="font-size:10px;color:var(--sub)">(고정)</span>'}</div><div class="tm">${it.tm}</div></div>`;
 }).join('')||'<div class="empty">오늘은 일정 없음</div>';
 const study=items.map((it,i)=>({...it,i})).filter(x=>x.s);
 const done=study.filter(x=>S.routine[k][x.i]).length;
 const pct=study.length?Math.round(done/study.length*100):0;
 document.getElementById('todayPct').textContent=`${done}/${study.length}`;
 document.getElementById('todayBar').style.width=pct+'%';
 // 주간
 let tot=0,ok=0;
 for(let o=0;o<7;o++){
  const dd=new Date(Date.now()-o*864e5),kk=dd.toISOString().slice(0,10);
  const its=(ROUTINE[dd.getDay()]||[]).map((it,i)=>({...it,i})).filter(x=>x.s);
  tot+=its.length; ok+=its.filter(x=>(S.routine[kk]||{})[x.i]).length;
 }
 const wp=tot?Math.round(ok/tot*100):0;
 document.getElementById('weekPct').textContent=wp+'%';
 document.getElementById('weekPct').style.color=wp>=70?'var(--green)':wp>=40?'var(--amber)':'var(--red)';
 document.getElementById('weekBar').style.width=wp+'%';
}
function togR(i){const k=today();S.routine[k][i]=!S.routine[k][i];save();renderToday();}

// ---- CKA ----
function renderCka(){
 document.getElementById('ckaList').innerHTML=CKA.map(([n,w],idx)=>{
  const p=S.cka[idx]||0;
  return `<div class="sec-row"><div class="sec-top"><span><span class="w">${w}</span>${n}</span><span class="p">${p}%</span></div>
   <div class="steps">${[0,25,50,75,100].map(v=>`<b class="${p>=v&&(v>0||p===0)?(p>=v&&v>0?'on':''):''}" onclick="setCka(${idx},${v})">${v}</b>`).join('')}</div></div>`;
 }).join('');
 const totW=CKA.reduce((a,c)=>a+c[2],0);
 const got=CKA.reduce((a,c,i)=>a+c[2]*(S.cka[i]||0)/100,0);
 const pct=Math.round(got/totW*100);
 document.getElementById('ckaPct').textContent=pct+'%';
 document.getElementById('ckaBar').style.width=pct+'%';
 document.getElementById('hTitle').textContent=`취준 트래커 · CKA ${pct}%`;
}
function setCka(i,v){S.cka[i]=v;save();renderCka();}

// ---- 목표 ----
function renderGoal(){
 document.getElementById('goalList').innerHTML=GOALS.map(([wk,g],i)=>{
  const st=S.goals[i];
  return `<div class="goal"><span class="wk">${wk}</span><span class="g">${g}</span>
   <button class="${st===1?'ok':st===2?'no':''}" onclick="togG(${i})">${st===1?'달성':st===2?'미달':'—'}</button></div>`;
 }).join('');
 const done=GOALS.filter((_,i)=>S.goals[i]===1).length;
 const judged=GOALS.filter((_,i)=>S.goals[i]).length;
 document.getElementById('goalPct').textContent=`${done}/${GOALS.length} 달성`;
 document.getElementById('goalBar').style.width=(done/GOALS.length*100)+'%';
}
function togG(i){S.goals[i]=((S.goals[i]||0)+1)%3;save();renderGoal();}

// ---- 지원 ----
const STATUS=['등록','서류 제출','면접 진행','최종 합격','탈락'];
function renderApp(){
 const now=new Date(today());
 S.apps.sort((a,b)=>(a.due||'9999')<(b.due||'9999')?-1:1);
 document.getElementById('appList').innerHTML=S.apps.map((a,i)=>{
  const diff=a.due?Math.round((new Date(a.due)-now)/864e5):null;
  const dd=diff===null?'':diff<0?'마감':diff===0?'오늘 마감!':`D-${diff}`;
  return `<div class="app-row"><div class="app-top"><b>${a.c}</b><span class="dd ${diff<0?'over':''}">${dd}</span></div>
   <div class="app-bot"><span class="role">${a.r||''}</span>
   <span><span class="st s${a.s}" onclick="togS(${i})">${STATUS[a.s]}</span><button class="del" onclick="delApp(${i})">삭제</button></span></div></div>`;
 }).join('')||'<div class="empty">등록된 공고 없음. 매일 브리핑에서 발견한 공고를 추가하세요</div>';
 document.getElementById('stTotal').textContent=S.apps.length;
 document.getElementById('stActive').textContent=S.apps.filter(a=>a.s>=1&&a.s<=2).length;
}
function addApp(){
 const c=document.getElementById('inComp').value.trim();
 if(!c)return;
 S.apps.push({c,r:document.getElementById('inRole').value.trim(),due:document.getElementById('inDue').value,s:0});
 document.getElementById('inComp').value='';document.getElementById('inRole').value='';document.getElementById('inDue').value='';
 save();renderApp();
}
function togS(i){S.apps[i].s=(S.apps[i].s+1)%5;save();renderApp();}
function delApp(i){if(confirm('삭제할까요?')){S.apps.splice(i,1);save();renderApp();}}

// ---- 탭 ----
function tab(id,btn){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
 document.getElementById('pg-'+id).classList.add('on');
 document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('on'));
 btn.classList.add('on');
}
renderDday();renderToday();renderCka();renderGoal();renderApp();
// PWA 오프라인 지원
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
